name: Generar branding (logo, banner, watermark)

on:
  workflow_dispatch:

jobs:
  brand:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install Pillow numpy
      - run: python scripts/make_brand.py
      - uses: actions/upload-artifact@v4
        with:
          name: branding-driftmoon-sleep
          retention-days: 30
          path: branding/
